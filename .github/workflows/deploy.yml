name: SPD v12 Clean Deploy

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create clean build folder
        run: |
          mkdir build
          cp index.html build/
          cp engine.js build/ 2>/dev/null || true
          cp ui.js build/ 2>/dev/null || true
          cp graph-engine.js build/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4