name: Deploy SPD v12 Energy Module

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🧠 FAST CLEAN (prevents hidden junk slowing upload)
      - name: Clean workspace
        run: |
          rm -rf node_modules || true
          rm -rf dist build || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # ⚡ CRITICAL FIX: ONLY DEPLOY REQUIRED FILES
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            index.html
            ui.js
            engine.js
            biodiesel-engine.js
            scenario/

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4