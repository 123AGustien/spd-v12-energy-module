<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v12 // ENERGY MODULE v2 (CASCADE)</title>

<style>
body{
margin:0;
background:#05070b;
color:#cfe8ff;
font-family:Arial;
}

.header{
padding:12px;
background:#0b1220;
text-align:center;
font-weight:bold;
}

#statusBar{
text-align:center;
padding:6px;
background:#0a0f18;
}

.panel{
display:flex;
justify-content:space-around;
padding:10px;
}

.card{
background:#0e1a2b;
width:22%;
padding:10px;
border-radius:6px;
text-align:center;
}

.value{font-size:26px;}

button{
margin:4px;
padding:8px;
background:#1f3b5c;
color:white;
border:none;
cursor:pointer;
border-radius:4px;
}

button:hover{background:#2b568a;}

.module{
margin:10px;
padding:10px;
background:#0a0f18;
font-size:13px;
border-radius:6px;
}

#log{
position:absolute;
right:10px;
top:140px;
width:320px;
height:340px;
overflow:auto;
background:#0a0f18;
padding:10px;
font-size:11px;
border-left:2px solid #1f3b5c;
}
</style>
</head>

<body>

<div class="header">🛰 SPD v12 // ENERGY MODULE v2 (CASCADE SYSTEM)</div>

<div id="statusBar">STATUS: INITIALISING</div>

<div class="panel">
<div class="card">FX<div id="FX" class="value">0</div></div>
<div class="card">DC<div id="DC" class="value">0</div></div>
<div class="card">CYB<div id="CYB" class="value">0</div></div>
<div class="card">INF<div id="INF" class="value">0</div></div>
</div>

<div class="panel">
<div class="card">ENERGY INDEX<div id="EN" class="value">0</div></div>
<div class="card">POLICY STATE<div id="PS" class="value">STABLE</div></div>
<div class="card">RISK<div id="RK" class="value">LOW</div></div>
<div class="card">CASCADES<div id="CS" class="value">0</div></div>
</div>

<div class="module" id="scenarioPanel">
<b>SCENARIO PANEL</b><br>Idle
</div>

<div class="module" id="riskPanel">
<b>RISK PANEL</b><br>Risk: LOW
</div>

<div class="module" id="solutionPanel">
<b>SOLUTION OPTIONS</b><br>- None
</div>

<div class="module" id="actionPanel">
<b>ACTION SEQUENCE PROMPT</b><br>- Awaiting input
</div>

<div style="text-align:center">
<button onclick="inject('FX')">FX STRESS</button>
<button onclick="inject('DC')">DC LOAD</button>
<button onclick="inject('CYB')">CYBER EVENT</button>
<button onclick="inject('INF')">INFRA STRAIN</button>
<button onclick="resetAll()">RESET</button>
</div>

<div id="log"></div>

<script>

/* STATE */
const state = {FX:0, DC:0, CYB:0, INF:0};
let log = [];
let cascadeCount = 0;

/* SCENARIOS */
const scenarios = {
FX:{name:"FX Volatility Spike",impact:"Triggers DC liquidity stress"},
DC:{name:"Data Centre Overload",impact:"Amplifies INF strain"},
CYB:{name:"Cyber Disruption",impact:"Reduces systemic trust"},
INF:{name:"Infrastructure Stress",impact:"Feeds FX instability loop"}
};

/* LOG */
function addLog(m){
log.push(m);
document.getElementById("log").innerHTML =
log.slice(-12).map(x=>"→ "+x).join("<br>");
}

/* ENERGY MODEL (NEW) */
function energyIndex(){
let oilShock = state.FX * 0.6;
let cpoStress = state.INF * 0.4;
return oilShock + cpoStress;
}

/* CASCADE ENGINE (NEW NON-LINEAR LOGIC) */
function applyCascade(type){

if(type === "FX"){
state.DC += 3;
state.INF += 2;
}

if(type === "DC"){
state.INF += 3;
state.CYB += 1;
}

if(type === "CYB"){
state.FX += 2;
state.INF += 1;
}

if(type === "INF"){
state.FX += 3;
state.DC += 1;
}
cascadeCount++;
}

/* RISK ENGINE (UPGRADED) */
function riskLevel(){

let total =
state.FX*1.2 +
state.DC*1.1 +
state.CYB*1.4 +
state.INF*1.3 +
energyIndex()*0.8;

if(total > 120) return "CRITICAL";
if(total > 70) return "HIGH";
if(total > 35) return "MEDIUM";
return "LOW";
}

/* POLICY ENGINE (NEW) */
function policyState(risk){
if(risk === "CRITICAL") return "FULL_OVERRIDE";
if(risk === "HIGH") return "CRISIS_MODE";
if(risk === "MEDIUM") return "ENERGY_SECURITY";
return "COST_OPTIMISATION";
}

/* SOLUTIONS */
function solutions(level){
if(level==="CRITICAL"){
return ["Emergency shutdown buffers","Auto load shedding","System isolation"];
}
if(level==="HIGH"){
return ["Activate reserves","Reduce external dependency"];
}
if(level==="MEDIUM"){
return ["Stabilisation active","Monitor volatility"];
}
return ["Normal operations"];
}

/* ACTION */
function inject(type){

state[type] += 10;

/* cascade propagation */
applyCascade(type);

let risk = riskLevel();
let policy = policyState(risk);
let energy = energyIndex();

document.getElementById("scenarioPanel").innerHTML =
"<b>SCENARIO PANEL</b><br>" +
scenarios[type].name + "<br>" +
scenarios[type].impact;

document.getElementById("riskPanel").innerHTML =
"<b>RISK PANEL</b><br>" +
"Risk: " + risk;

document.getElementById("solutionPanel").innerHTML =
"<b>SOLUTION OPTIONS</b><br>" +
solutions(risk).map(x=>"• "+x).join("<br>");

document.getElementById("actionPanel").innerHTML =
"<b>ACTION SEQUENCE</b><br>" +
"Step 1: Detect " + type + "<br>" +
"Step 2: Cascade propagation active<br>" +
"Step 3: Apply mitigation → " + scenarios[type].impact;

addLog("INJECT " + type + " | CASCADE=" + cascadeCount);

updateUI(risk, policy, energy);
}

/* UI UPDATE */
function updateUI(risk, policy, energy){

document.getElementById("statusBar").innerText =
"STATUS: " + risk + " | POLICY: " + policy;

document.getElementById("EN").innerText =
energy.toFixed(1);

document.getElementById("PS").innerText =
policy;

document.getElementById("RK").innerText =
risk;

document.getElementById("CS").innerText =
cascadeCount;

/* render metrics */
FX.innerText = state.FX;
DC.innerText = state.DC;
CYB.innerText = state.CYB;
INF.innerText = state.INF;
}

/* RESET */
function resetAll(){
state.FX=0;state.DC=0;state.CYB=0;state.INF=0;
cascadeCount=0;
log=[];
addLog("SYSTEM RESET");
updateUI("LOW","STABLE",0);
}

/* INIT */
updateUI("LOW","STABLE",0);

</script>

</body>
</html>
