<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v12 // ENERGY MODULE SIMULATOR</title>

<style>
body{
margin:0;
background:#05070b;
color:#cfe8ff;
font-family:Arial;
}

.header{
padding:12px;
background:#0b1220;
text-align:center;
font-weight:bold;
}

#statusBar{
text-align:center;
padding:6px;
background:#0a0f18;
}

.panel{
display:flex;
justify-content:space-around;
padding:10px;
}

.card{
background:#0e1a2b;
width:22%;
padding:10px;
border-radius:6px;
text-align:center;
}

.value{font-size:26px;}

button{
margin:4px;
padding:8px;
background:#1f3b5c;
color:white;
border:none;
cursor:pointer;
border-radius:4px;
}

button:hover{
background:#2b568a;
}

.module{
margin:10px;
padding:10px;
background:#0a0f18;
font-size:13px;
border-radius:6px;
}

#log{
position:absolute;
right:10px;
top:140px;
width:320px;
height:340px;
overflow:auto;
background:#0a0f18;
padding:10px;
font-size:11px;
border-left:2px solid #1f3b5c;
}
</style>
</head>

<body>

<div class="header">🛰 SPD v12 // ENERGY MODULE SIMULATOR</div>

<div id="statusBar">STATUS: STABLE</div>

<!-- METRICS -->
<div class="panel">
<div class="card">FX<div id="FX" class="value">0</div></div>
<div class="card">DC<div id="DC" class="value">0</div></div>
<div class="card">CYB<div id="CYB" class="value">0</div></div>
<div class="card">INF<div id="INF" class="value">0</div></div>
</div>

<!-- MODULE PANELS -->
<div class="module" id="scenarioPanel">
<b>SCENARIO PANEL</b><br>Idle
</div>

<div class="module" id="riskPanel">
<b>RISK PANEL</b><br>Risk: LOW
</div>

<div class="module" id="solutionPanel">
<b>SOLUTION OPTIONS</b><br>- None
</div>

<div class="module" id="actionPanel">
<b>ACTION SEQUENCE PROMPT</b><br>- Awaiting input
</div>

<!-- BUTTONS -->
<div style="text-align:center">
<button onclick="inject('FX')">FX STRESS</button>
<button onclick="inject('DC')">DC LOAD</button>
<button onclick="inject('CYB')">CYBER EVENT</button>
<button onclick="inject('INF')">INFRA STRAIN</button>
<button onclick="resetAll()">RESET</button>
</div>

<div id="log"></div>

<script>

/* STATE */
const state = {
FX:0,
DC:0,
CYB:0,
INF:0
};

let log = [];

/* SCENARIOS */
const scenarios = {
FX:{
name:"Financial Stress Injection",
desc:"FX volatility increases system instability",
impact:"Spreads into DC liquidity pressure"
},
DC:{
name:"Data Centre Load Spike",
desc:"Compute demand surge detected",
impact:"Triggers INF stress propagation"
},
CYB:{
name:"Cyber Event Triggered",
desc:"Security anomaly detected in network layer",
impact:"Reduces system reliability"
},
INF:{
name:"Infrastructure Strain",
desc:"Physical system stress escalation",
impact:"Feeds back into FX instability loop"
}
};

/* LOG */
function addLog(msg){
log.push(msg);
document.getElementById("log").innerHTML =
log.slice(-12).map(x=>"→ "+x).join("<br>");
}

/* RISK ENGINE */
function riskLevel(){
let total = state.FX + state.DC + state.CYB + state.INF;

if(total > 60) return "CRITICAL";
if(total > 30) return "HIGH";
if(total > 10) return "MEDIUM";
return "LOW";
}

/* SOLUTION ENGINE */
function solutions(level){
if(level==="CRITICAL"){
return [
"Emergency stabilisation protocol activated",
"Auto load shedding enabled",
"System isolation engaged"
];
}
if(level==="HIGH"){
return [
"Partial damping applied",
"Risk redistribution active"
];
}
if(level==="MEDIUM"){
return [
"Monitoring intensified",
"Minor balancing active"
];
}
return ["No intervention required"];
}

/* ACTION */
function inject(type){

state[type] += 10;

const s = scenarios[type];
const risk = riskLevel();

document.getElementById("scenarioPanel").innerHTML =
"<b>SCENARIO PANEL</b><br>" +
s.name + "<br>" + s.desc;

document.getElementById("riskPanel").innerHTML =
"<b>RISK PANEL</b><br>Risk: " + risk;

document.getElementById("solutionPanel").innerHTML =
"<b>SOLUTION OPTIONS</b><br>" +
solutions(risk).map(x=>"• "+x).join("<br>");

document.getElementById("actionPanel").innerHTML =
"<b>ACTION SEQUENCE PROMPT</b><br>" +
"Step 1: Detect " + type + "<br>" +
"Step 2: Evaluate cascade impact<br>" +
"Step 3: Apply mitigation → " + s.impact;

addLog("INJECT " + type + " → " + s.name);

updateStatus();
}

/* RESET */
function resetAll(){
state.FX=0;
state.DC=0;
state.CYB=0;
state.INF=0;
log=[];
addLog("SYSTEM RESET");
updateStatus();
}

/* STATUS */
function updateStatus(){
document.getElementById("statusBar").innerText =
"STATUS: " + riskLevel();
}

/* RENDER */
function render(){
FX.innerText = state.FX;
DC.innerText = state.DC;
CYB.innerText = state.CYB;
INF.innerText = state.INF;
}

setInterval(()=>{
render();
updateStatus();
},500);

render();
updateStatus();

</script>

</body>
</html>
