<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SPD v12 AUTONOMOUS COCKPIT // BIODIESEL INTEGRATION</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #070b12, #020409);
  color: #cfe8ff;
}

.header {
  padding: 12px;
  background: #0c1625;
  text-align: center;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px;
}

.panel {
  background: #0b1220;
  padding: 12px;
  border: 1px solid #1c2a3a;
  border-radius: 8px;
}

button {
  padding: 8px;
  margin-top: 6px;
  width: 100%;
  background: #1c2f4a;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #2a4b73;
}

.value {
  font-weight: bold;
  color: #7dd3fc;
}
</style>
</head>

<body>

<div class="header">
SPD v12 AUTONOMOUS COCKPIT // ENERGY + BIODIESEL SYSTEM
</div>

<div class="container">

  <!-- FX PANEL -->
  <div class="panel">
    <h3>FX / INF SYSTEM</h3>
    <div>FX: <span id="fx">0</span></div>
    <div>INF: <span id="inf">0</span></div>
    <div>DC: <span id="dc">0</span></div>
    <div>CYB: <span id="cyb">0</span></div>
    <button onclick="inject('FX')">Inject FX</button>
    <button onclick="inject('INF')">Inject INF</button>
  </div>

  <!-- BIODIESEL PANEL -->
  <div class="panel">
    <h3>BIODIESEL LAYER</h3>
    <div>Blend Ratio: <span id="blend">35</span></div>
    <div>CPO Stock: <span id="cpo">100</span></div>
    <div>Import Dependency: <span id="imp">60</span></div>
    <div>Stability: <span id="stab">NORMAL</span></div>
  </div>

</div>

<script type="module">
import { state, inject } from "./engine.js";
import { biodieselState, updateBiodieselLayer } from "./biodiesel-engine.js";


<!-- SCENARIO PANEL -->
<div class="panel" id="scenarioPanel">
  <h3>SCENARIO PANEL</h3>
  Idle
</div>

<!-- RISK PANEL -->
<div class="panel" id="riskPanel">
  <h3>RISK PANEL</h3>
  Risk: LOW
</div>

<!-- SOLUTION PANEL -->
<div class="panel" id="solutionPanel">
  <h3>SOLUTION PANEL</h3>
  Awaiting scenario...
</div>

<!-- ACTION PANEL -->
<div class="panel" id="actionPanel">
  <h3>ACTION SEQUENCE</h3>
  Awaiting operator input...
</div>

/* -------------------------
   MAIN UI LOOP
--------------------------*/
function render() {

  document.getElementById("fx").innerText = state.FX;
  document.getElementById("inf").innerText = state.INF;
  document.getElementById("dc").innerText = state.DC;
  document.getElementById("cyb").innerText = state.CYB;

  document.getElementById("blend").innerText = biodieselState.blendRatio.toFixed(1);
  document.getElementById("cpo").innerText = biodieselState.cpoStock;
  document.getElementById("imp").innerText = biodieselState.importDependency;
  document.getElementById("stab").innerText = biodieselState.stability;
}

/* -------------------------
   WRAP INJECT FUNCTION
--------------------------*/
window.inject = function(type) {

  const result = inject(type);

  // sync biodiesel layer
  updateBiodieselLayer(result.risk);

  render();
};

/* initial render */
render();
</script>

</body>
</html>
